apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: ci-cd-pipeline
spec:
  params:
    - name: repo-url
      type: string
    - name: branch
      type: string
      default: main
    - name: image-name
      type: string
  workspaces:
    - name: pipeline-workspace
  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: pipeline-workspace

    - name: git-clone
      runAfter: [cleanup]
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.branch)
      workspaces:
        - name: output
          workspace: pipeline-workspace

    - name: flake8
      runAfter: [git-clone]
      taskRef:
        name: flake8
      workspaces:
        - name: source
          workspace: pipeline-workspace

    - name: nose
      runAfter: [flake8]
      taskRef:
        name: nose
      workspaces:
        - name: source
          workspace: pipeline-workspace

    - name: buildah
      runAfter: [nose]
      taskRef:
        name: buildah
      params:
        - name: IMAGE
          value: $(params.image-name)
      workspaces:
        - name: source
          workspace: pipeline-workspace

    - name: deploy
      runAfter: [buildah]
      taskRef:
        name: openshift-client
      params:
        - name: SCRIPT
          value: |
            oc rollout restart deployment/ci-cd-final-project
      workspaces:
        - name: manifest-dir
          workspace: pipeline-workspace
